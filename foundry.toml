[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Solidity version
solc_version = "0.8.20"

# Enable IR pipeline + optimizer for stack management
via_ir = true
optimizer = true
optimizer_runs = 200

# Gas reporting
gas_reports = ["*"]

[profile.default.fuzz]
runs = 256

[profile.ci.fuzz]
runs = 1024
verbosity = 4

# Etherscan verification
[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}" }

# RPC endpoints
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
